<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jack of All Trades Checker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="app">

    <header class="header">
        <div>
            <h1>Jack of All Trades Checker</h1>
            <p>League of Legends「何でも屋」スタック確認ツール</p>
        </div>
        <div class="patch">Patch {{ patch }}</div>
    </header>

    <div class="toast">開発中</div>

    <section class="role-tabs">
        <button type="button" data-role="top">
        🛡<br>
        TOP
        </button>

        <button type="button" data-role="jungle">
        🌿<br>
        JG
        </button>

        <button type="button" data-role="mid">
        ✨<br>
        MID
        </button>

        <button type="button" class="active" data-role="adc">
        🏹<br>
        ADC
        </button>

        <button type="button" data-role="support">
        💠<br>
        SUP
        </button>
    </section>

    <section class="panel build-panel">
        <div class="panel-title">
            <h2>Build</h2>
            <button class="clear-button">クリア</button>
        </div>

        <div class="build-grid">
            <div class="item-slot" data-slot="0"></div>
            <div class="item-slot" data-slot="1"></div>
            <div class="item-slot" data-slot="2"></div>
            <div class="item-slot" data-slot="3"></div>
            <div class="item-slot" data-slot="4"></div>
            <div class="item-slot" data-slot="5"></div>
            <div class="item-slot" data-slot="6"></div>
        </div>
    </section>

    <section class="stack-section">
        <h2>現在のスタック</h2>
        <div class="stack-boxes" id="stack-boxes">
            <div class="stack-box" data-stack="0"></div>
            <div class="stack-box" data-stack="1"></div>
            <div class="stack-box" data-stack="2"></div>
            <div class="stack-box" data-stack="3"></div>
            <div class="stack-box" data-stack="4"></div>
            <div class="stack-box" data-stack="5"></div>
            <div class="stack-box" data-stack="6"></div>
            <div class="stack-box" data-stack="7"></div>
            <div class="stack-box" data-stack="8"></div>
            <div class="stack-box" data-stack="9"></div>
        </div>
        <div class="stack-count" id="stack-count">0 / 10</div>
    </section>

<section class="panel status-panel">

    <div class="status-column">
        <h2>取得済み</h2>

        <ul id="acquired-stats">

        </ul>

    </div>

    <div class="status-column">

        <h2>未取得</h2>

        <ul id="missing-stats">

        </ul>

    </div>

</section>

    <section class="panel item-search-panel">
        <h2>検索</h2>
        <input id="item-search" type="search" placeholder="アイテム名で検索..." autocomplete="off">

        <h2>クラス</h2>
        <div class="class-filters" aria-label="アイテムクラス">
            <button class="class-filter" type="button" data-category="fighter" title="ファイター" aria-label="ファイター">
                <img src="{{ url_for('static', filename='images/classes/fighter.png') }}" alt="">
            </button>
            <button class="class-filter" type="button" data-category="marksman" title="マークスマン" aria-label="マークスマン">
                <img src="{{ url_for('static', filename='images/classes/marksman.png') }}" alt="">
            </button>
            <button class="class-filter" type="button" data-category="assassin" title="アサシン" aria-label="アサシン">
                <img src="{{ url_for('static', filename='images/classes/assassin.png') }}" alt="">
            </button>
            <button class="class-filter" type="button" data-category="mage" title="メイジ" aria-label="メイジ">
                <img src="{{ url_for('static', filename='images/classes/mage.png') }}" alt="">
            </button>
            <button class="class-filter" type="button" data-category="tank" title="タンク" aria-label="タンク">
                <img src="{{ url_for('static', filename='images/classes/tank.png') }}" alt="">
            </button>
            <button class="class-filter" type="button" data-category="support" title="サポート" aria-label="サポート">
                <img src="{{ url_for('static', filename='images/classes/support.png') }}" alt="">
            </button>
        </div>
    </section>

    <div class="item-list">

        {% for item in items %}

        <div 
            class="item-card"
            data-item='{{ item | tojson }}'
        >

            <img
                src="{{ item.image.url }}"
                alt="{{ item.name }}"
                title="{{ item.name }}"
            >

        </div>

        {% endfor %}

    </div>

</div>

<script src="{{ url_for('static', filename='js/stack.js') }}"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
<script src="{{ url_for('static', filename='js/search.js') }}"></script>

</body>
</html>
